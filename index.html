<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>יו-טוב, חיפוש וידאו מסונן</title>
    
    <!-- Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P4CSM96PSL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P4CSM96PSL');
    </script>

    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* עיצוב נקי, מקצועי ומרשים (SaaS Style) */
        :root {
            --bg-body: #f4f7f9;
            --bg-card: #ffffff;
            --primary: #1a56db;
            --primary-hover: #1e40af;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* סרגל התחברות עליון */
        .auth-bar {
            display: flex; justify-content: flex-end; align-items: center; gap: 15px;
            max-width: 1400px; margin: 0 auto 20px auto; width: 100%; height: 50px;
        }
        
        .btn-google {
            display: flex; align-items: center; gap: 10px; padding: 8px 16px;
            background: #ffffff; border: 1px solid var(--border-color); border-radius: 8px;
            font-size: 14px; font-weight: 600; cursor: pointer; color: var(--text-main);
            box-shadow: var(--shadow-sm); transition: all 0.2s;
        }
        .btn-google:hover { background: #f8fafc; box-shadow: var(--shadow-md); }
        .btn-google img { width: 18px; height: 18px; }

        .user-profile {
            display: flex; align-items: center; gap: 12px;
            background: #ffffff; padding: 6px 12px; border-radius: 50px;
            border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
        }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; }
        .user-profile span { font-size: 14px; font-weight: 600; color: var(--text-main); }
        
        .btn-history {
            background: #10b981; color: white; border: none; padding: 6px 14px;
            border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .btn-history:hover { background: #059669; }
        
        .btn-logout {
            background: transparent; color: #ef4444; border: 1px solid #fca5a5; padding: 6px 14px;
            border-radius: 20px; font-size: 13px; cursor: pointer; transition: 0.2s;
        }
        .btn-logout:hover { background: #fef2f2; }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { margin: 0 0 12px 0; font-size: 2.8em; color: #0f172a; font-weight: 800; letter-spacing: -0.5px; }
        .header p { margin: 0; color: var(--text-muted); font-size: 1.15em; font-weight: 500; }

        /* אזור החיפוש */
        .search-area { display: flex; flex-wrap: wrap; gap: 12px; margin: 0 auto 40px auto; max-width: 900px; width: 100%; }
        input {
            flex: 1; min-width: 250px; padding: 16px 20px; border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 16px; outline: none; background: var(--bg-card); 
            box-shadow: var(--shadow-sm); transition: all 0.2s ease; color: var(--text-main);
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.2); }

        button.main-btn {
            padding: 16px 32px; background: var(--primary); color: white; border: none; border-radius: 8px; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
        }
        button.main-btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        button.main-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        
        #loadMoreBtn { background: #ffffff; color: var(--text-main); border: 1px solid var(--border-color); display: none; }
        #loadMoreBtn:hover:not(:disabled) { background: #f9fafb; }

        /* חלוקה לסרגל צד ואזור מרכזי */
        .layout-wrapper { display: flex; gap: 30px; max-width: 1400px; margin: auto; align-items: flex-start; flex: 1; width: 100%; }

        .sidebar {
            flex: 0 0 320px; background: var(--bg-card); border-radius: 12px; padding: 24px; 
            border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); position: sticky; 
            top: 24px; max-height: calc(100vh - 48px); overflow-y: auto; display: none; 
        }
        .main-content { flex: 1; min-width: 0; display: none; }

        .section-title { display: flex; align-items: center; gap: 10px; margin: 0 0 20px 0; padding-bottom: 12px; border-bottom: 2px solid #f1f5f9; font-size: 1.25em; font-weight: 700; color: #1e293b; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .blocked-row { display: flex; gap: 16px; overflow-x: auto; padding: 4px 4px 20px 4px; }
        .blocked-row::-webkit-scrollbar { height: 6px; }
        .blocked-row::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        .video-card {
            background: var(--bg-card); border-radius: 12px; overflow: hidden; transition: all 0.3s ease; 
            position: relative; border: 1px solid var(--border-color); box-shadow: var(--shadow-sm); display: flex; flex-direction: column;
        }
        .video-card.clickable { cursor: pointer; }
        .video-card.clickable:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #cbd5e1; }

        .blocked-row .video-card { flex: 0 0 200px; opacity: 0.85; filter: grayscale(20%); }
        .sidebar .video-card { margin-bottom: 16px; box-shadow: none; border-color: #f1f5f9; }

        .thumb-container { position: relative; padding-top: 56.25%; background: #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .thumb-container img { position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: cover; }

        .play-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(15, 23, 42, 0.7); 
            color: white; border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.2s ease; padding-left: 4px; backdrop-filter: blur(4px); border: 2px solid rgba(255,255,255,0.2);
        }
        .video-card.clickable:hover .play-overlay { background: var(--primary); transform: translate(-50%, -50%) scale(1.1); border-color: rgba(255,255,255,0.5); }

        .card-content { padding: 14px; }
        .card-content h3 { margin: 0; font-size: 14px; line-height: 1.5; height: 42px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; color: var(--text-main); font-weight: 600; }

        .status-tag { position: absolute; top: 10px; right: 10px; padding: 4px 10px; border-radius: 9999px; font-size: 11px; font-weight: 700; z-index: 10; letter-spacing: 0.5px; }
        .status-checking { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .status-open { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-blocked { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .status-history { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

        /* נגן מובנה (Modal) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); 
            backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content-wrapper { position: relative; width: 100%; max-width: 960px; }
        .modal-content { width: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); aspect-ratio: 16/9; border: 1px solid rgba(255,255,255,0.1); }
        .close-btn { position: absolute; top: -40px; left: 0; color: #cbd5e1; font-size: 14px; cursor: pointer; background: transparent; border: none; padding: 8px 12px; font-weight: 600; transition: 0.2s; z-index: 1001; letter-spacing: 0.5px; }
        .close-btn:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 6px; }

        #hidden-checker { position: fixed; top: -1000px; width: 1px; height: 1px; overflow: hidden; }
        
        .footer-credit { text-align: center; margin-top: auto; padding: 60px 20px 20px 20px; color: #64748b; font-size: 0.9em; }
        .footer-credit a { color: var(--primary); text-decoration: none; font-weight: 600; }

        @media (max-width: 900px) {
            .layout-wrapper { flex-direction: column; gap: 20px; }
            .sidebar { flex: none; width: 100%; position: static; max-height: 350px; }
            .header h1 { font-size: 2em; }
            .auth-bar { justify-content: center; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

<div class="auth-bar" id="authContainer">
    <!-- תוכן סרגל ההתחברות יוזרק לפה ע"י ה-JS -->
</div>

<div class="header">
    <h1>יו-טוב, חיפוש וידאו מסונן</h1>
    <p>מנוע חיפוש מסונן המבוסס על בדיקה בזמן אמת ועל מסד נתונים מצטבר</p>
</div>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="מה תרצה לחפש היום?" onkeypress="if(event.key === 'Enter') handleSearch(false)">
    <button id="searchBtn" class="main-btn" onclick="handleSearch(false)">חפש עכשיו</button>
    <button id="loadMoreBtn" class="main-btn" onclick="handleSearch(true)">טען עוד תוצאות</button>
</div>

<div class="layout-wrapper">
    <aside class="sidebar" id="checkingSidebarWrapper">
        <h2 class="section-title"><span>⏳</span> כרגע בבדיקה</h2>
        <div id="checkingList"></div>
    </aside>

    <main class="main-content" id="mainContentArea">
        <div class="open-section">
            <h2 id="mainAreaTitle" class="section-title"><span>✅</span> סרטונים זמינים לצפייה</h2>
            <div id="openGrid" class="video-grid"></div>
            
            <!-- הכפתור החדש של ההיסטוריה -->
            <div style="text-align: center; margin-top: 20px;">
                <button id="loadMoreHistoryBtn" class="main-btn" onclick="fetchAndShowHistory(true)" style="display: none; background: #10b981; border: none;">טען היסטוריה ישנה יותר 🕒</button>
            </div>
        </div>

        <div class="blocked-section" id="blockedSection" style="margin-top: 40px;">
            <h2 class="section-title" style="font-size: 1.1em; color: #475569;"><span>❌</span> סרטונים חסומים</h2>
            <div id="blockedRow" class="blocked-row"></div>
        </div>
    </main>
</div>

<div class="footer-credit">
    נבנה על ידי <strong>'לב טוב'</strong> | ליצירת קשר: <a href="mailto:myylbwt@gmail.com">myylbwt@gmail.com</a>
    <div style="margin-top: 10px;">
        <button onclick="promptUserForKey()" style="padding: 4px 8px; font-size: 11px; background: #e2e8f0; border: none; border-radius: 4px; cursor:pointer;">השתמש במפתח API אישי</button>
    </div>
</div>

<div class="modal-overlay" id="videoModal" onclick="closePlayer(event)">
    <div class="modal-content-wrapper">
        <button class="close-btn" onclick="closePlayer(event, true)">✖ סגור נגן</button>
        <div class="modal-content" id="playerContainer"></div>
    </div>
</div>

<div id="hidden-checker"></div>

<script>
    // ================= הגדרות מערכת =================
    const CONFIG = {
        API_KEYS: [
            'AIzaS_הכנס_את_המפתח_הראשון_שלך_כאן',
            'AIzaS_הכנס_את_המפתח_השני_שלך_כאן'
        ],
        CURRENT_KEY_INDEX: 0,
        SUPABASE_URL: 'https://rqeluyi********************ase.co',
        SUPABASE_KEY: 'sb_publishable_VmT********************hSVglQ',
        MAX_CONCURRENT_CHECKS: 5
    };

    // אתחול לקוח Supabase
    const supabaseClient = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
    let currentUser = null;

    let videoCache = {};
    let isYTReady = false;
    let detectedFilter = 'Unknown';
    let currentQuery = '';
    let nextPageToken = '';
    let openVideosInCurrentBatch = 0;
    let historyOffset = 0; // זוכר איזה עמוד היסטוריה אנחנו קוראים עכשיו
    const HISTORY_PAGE_SIZE = 50; // כמה סרטונים למשוך בכל לחיצה

    window.onYouTubeIframeAPIReady = function() { isYTReady = true; };

    // ================= מערכת משתמשים (Auth) =================
    
    // בדיקת התחברות בטעינת הדף
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
        handleAuthChange(session);
    });

    supabaseClient.auth.onAuthStateChange((_event, session) => {
        handleAuthChange(session);
    });

    function handleAuthChange(session) {
        currentUser = session ? session.user : null;
        const authContainer = document.getElementById('authContainer');
        
        if (currentUser) {
            // משתמש מחובר
            const userName = currentUser.user_metadata.full_name || 'משתמש';
            const userAvatar = currentUser.user_metadata.avatar_url || 'https://www.gravatar.com/avatar/?d=mp';
            
            authContainer.innerHTML = `
                <div class="user-profile">
                    <img src="${userAvatar}" alt="Avatar">
                    <span>שלום, ${userName}</span>
                    <button class="btn-history" onclick="fetchAndShowHistory()">🕒 היסטוריית הצפיות שלי</button>
                    <button class="btn-logout" onclick="logout()">התנתק</button>
                </div>
            `;
        } else {
            // משתמש לא מחובר
            authContainer.innerHTML = `
                <button class="btn-google" onclick="loginWithGoogle()">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google">
                    התחבר עם גוגל לשמירת היסטוריה
                </button>
            `;
        }
    }

    async function loginWithGoogle() {
        await supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: window.location.origin }
        });
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload(); // רענון הדף כדי לאפס הכל
    }

    // ================= ניהול מפתחות חיפוש =================
    function getActiveApiKey() {
        const userKey = sessionStorage.getItem('user_api_key');
        if (userKey) return userKey;
        return CONFIG.API_KEYS[CONFIG.CURRENT_KEY_INDEX];
    }

    function rotateApiKey() {
        if (sessionStorage.getItem('user_api_key')) return; 
        CONFIG.CURRENT_KEY_INDEX = (CONFIG.CURRENT_KEY_INDEX + 1) % CONFIG.API_KEYS.length;
    }

    function promptUserForKey() {
        const key = prompt("הכנס מפתח API אישי (המפתח נשמר רק עד סגירת הדפדפן):");
        if (key) {
            sessionStorage.setItem('user_api_key', key);
            alert("המפתח הוגדר בהצלחה!");
        }
    }

    // ================= זיהוי סינון =================
    async function initFilterDetection() {
        try {
            await fetch('http://netfree.link/api/user', { mode: 'no-cors', cache: 'no-store' });
            detectedFilter = 'NetFree';
        } catch (e) {
            detectedFilter = 'Other';
        }
    }
    initFilterDetection();

    // ================= ניהול החיפוש =================
    async function handleSearch(isLoadMore = false) {
        if (!isYTReady) return alert("המערכת טוענת רכיבים, אנא המתן שניה ונסה שוב.");
        
        const queryInput = document.getElementById('searchInput').value.trim();
        if (!queryInput) return;

        if (!isLoadMore) {
            currentQuery = queryInput;
            nextPageToken = '';
            document.getElementById('checkingList').innerHTML = '';
            document.getElementById('openGrid').innerHTML = '';
            document.getElementById('blockedRow').innerHTML = '';
            document.getElementById('mainAreaTitle').innerHTML = '<span>✅</span> סרטונים זמינים לצפייה';
            document.getElementById('blockedSection').style.display = 'block';
            document.getElementById('loadMoreHistoryBtn').style.display = 'none'; // <-- השורה החדשה
            if (typeof gtag !== 'undefined') gtag('event', 'search', { search_term: currentQuery });
        }

        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        searchBtn.disabled = true; loadMoreBtn.disabled = true;
        searchBtn.innerText = isLoadMore ? 'טוען...' : 'מחפש...';
        
        document.getElementById('checkingSidebarWrapper').style.display = 'block';
        document.getElementById('mainContentArea').style.display = 'block';

        openVideosInCurrentBatch = 0;

        try {
            let apiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(currentQuery)}&type=video&key=${getActiveApiKey()}`;
            if (nextPageToken) apiUrl += `&pageToken=${nextPageToken}`;

            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            nextPageToken = data.nextPageToken || '';
            const videos = data.items;

            if (videos.length === 0) {
                if (!isLoadMore) alert("לא נמצאו תוצאות לחיפוש זה.");
                return;
            }

            videos.forEach(v => renderPlaceholder(v));

            for (let i = 0; i < videos.length; i += CONFIG.MAX_CONCURRENT_CHECKS) {
                const chunk = videos.slice(i, i + CONFIG.MAX_CONCURRENT_CHECKS);
                await Promise.all(chunk.map(async (v) => {
                    const videoId = v.id.videoId;
                    const title = v.snippet.title;

                    const dbStatus = await checkGlobalIndex(videoId);
                    if (dbStatus === 'blocked') return finalizeStatus(videoId, 'blocked', title, false);
                    if (dbStatus === 'open') return finalizeStatus(videoId, 'open', title, false);

                    const isImageOpen = await quickImageCheck(videoId);

                    if (detectedFilter === 'NetFree') {
                        if (isImageOpen) {
                            return finalizeStatus(videoId, 'open', title, true);
                        } else {
                            return finalizeStatus(videoId, 'netfree_pending', title, false); 
                        }
                    } else {
                        if (!isImageOpen) return finalizeStatus(videoId, 'blocked', title, true);
                        await deepPlayerCheck(videoId, title);
                    }
                }));
            }

            loadMoreBtn.style.display = nextPageToken ? 'inline-block' : 'none';

        } catch (e) {
            if (e.message.includes('quota') || e.message.includes('403')) {
                rotateApiKey();
                alert("המכסה של המפתח הנוכחי נגמרה. עברנו למפתח גיבוי - אנא נסה שוב.");
            } else {
                alert("שגיאה בחיפוש: " + e.message);
            }
        } finally {
            searchBtn.disabled = false; loadMoreBtn.disabled = false;
            searchBtn.innerText = 'חפש עכשיו'; loadMoreBtn.innerText = 'טען עוד תוצאות';
        }
    }

    // ================= לוגיקת סיום בדיקה =================
    function quickImageCheck(videoId) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
        });
    }

    function deepPlayerCheck(videoId, title) {
        return new Promise((resolve) => {
            if (videoCache[videoId] !== undefined) {
                finalizeStatus(videoId, videoCache[videoId] ? 'open' : 'blocked', title, false);
                return resolve();
            }

            const checkDiv = document.createElement('div');
            const divId = `check-${videoId}`; checkDiv.id = divId;
            document.getElementById('hidden-checker').appendChild(checkDiv);

            let hasResolved = false;

            const player = new YT.Player(divId, {
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'mute': 1, 'origin': window.location.origin },
                events: {
                    'onReady': (e) => e.target.playVideo(),
                    'onStateChange': (e) => {
                        if (!hasResolved && (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.BUFFERING)) {
                            hasResolved = true; cleanupAndFinish(true);
                        }
                    },
                    'onError': () => { if (!hasResolved) { hasResolved = true; cleanupAndFinish(false); } }
                }
            });

            const timeout = setTimeout(() => { if (!hasResolved) { hasResolved = true; cleanupAndFinish(false); } }, 6000);

            function cleanupAndFinish(isOpen) {
                clearTimeout(timeout);
                try { player.destroy(); document.getElementById(divId)?.remove(); } catch(err) {}
                finalizeStatus(videoId, isOpen ? 'open' : 'blocked', title, true);
                resolve();
            }
        });
    }

    function finalizeStatus(videoId, status, title, shouldSaveToDB) {
        if (status === true) status = 'open';
        if (status === false) status = 'blocked';
        videoCache[videoId] = status;
        
        const card = document.getElementById(`card-${videoId}`);
        const tag = document.getElementById(`status-${videoId}`);
        if (!card || !tag) return;

        if (status === 'open') {
            openVideosInCurrentBatch++;
            tag.innerText = "פתוח";
            tag.className = "status-tag status-open";
            card.classList.add('clickable');
            
            const thumbContainer = card.querySelector('.thumb-container');
            if(!thumbContainer.querySelector('.play-overlay')) {
                const playIcon = document.createElement('div');
                playIcon.className = 'play-overlay'; playIcon.innerHTML = '&#9658;'; 
                thumbContainer.appendChild(playIcon);
            }
            document.getElementById('openGrid').appendChild(card);
            card.onclick = () => openPlayerModal(videoId);
            if (shouldSaveToDB) saveToGlobalIndex(videoId, title, true);

        } else if (status === 'netfree_pending') {
            tag.innerText = "חסום / טרם נבדק";
            tag.style.background = "#e2e8f0"; tag.style.color = "#334155"; tag.style.border = "1px solid #cbd5e1";
            card.classList.add('clickable');
            document.getElementById('blockedRow').appendChild(card);
            card.onclick = () => openPlayerModal(videoId);
        } else {
            tag.innerText = "חסום"; tag.className = "status-tag status-blocked";
            card.classList.remove('clickable'); card.onclick = null;
            document.getElementById('blockedRow').appendChild(card);
            if (shouldSaveToDB) saveToGlobalIndex(videoId, title, false);
        }

        if (document.getElementById('checkingList').children.length === 0) {
            document.getElementById('checkingSidebarWrapper').style.display = 'none';
        }
    }

    // ================= מסד נתונים (Global DB) =================
    async function checkGlobalIndex(videoId) {
        try {
            const { data, error } = await supabaseClient
                .from('videos')
                .select('status')
                .eq('video_id', videoId)
                .eq('filter_provider', detectedFilter);
            return (data && data.length > 0) ? data[0].status : null;
        } catch (e) { return null; }
    }

    async function saveToGlobalIndex(id, title, isOpen) {
        try {
            await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/videos`, {
                method: 'POST',
                headers: {
                    'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`,
                    'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates'
                },
                body: JSON.stringify({
                    video_id: id, title: title, status: isOpen ? 'open' : 'blocked',
                    filter_provider: detectedFilter, updated_at: new Date()
                })
            });
        } catch (e) { console.error("DB Save Error", e); }
    }

    // ================= ממשק משתמש ונגן + שמירת היסטוריה =================
    function renderPlaceholder(v) {
        const id = v.id.videoId;
        const list = document.getElementById('checkingList');
        const card = document.createElement('div');
        card.className = 'video-card'; card.id = `card-${id}`;
        card.innerHTML = `
            <div id="status-${id}" class="status-tag status-checking">בבדיקה...</div>
            <div class="thumb-container"><img src="${v.snippet.thumbnails.medium.url}" loading="lazy" alt="Thumbnail"></div>
            <div class="card-content"><h3>${v.snippet.title}</h3></div>
        `;
        list.appendChild(card);
    }

    async function openPlayerModal(videoId) {
        const modal = document.getElementById('videoModal');
        const container = document.getElementById('playerContainer');
        container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        modal.classList.add('active');
        if (typeof gtag !== 'undefined') gtag('event', 'video_play', { video_id: videoId });

        // שמירת היסטוריה אם המשתמש מחובר
        if (currentUser) {
            const card = document.getElementById(`card-${videoId}`);
            if (card) {
                const title = card.querySelector('h3').innerText;
                const imgUrl = card.querySelector('img').src;
                try {
                    await supabaseClient.from('user_history').insert([{
                        user_id: currentUser.id,
                        video_id: videoId,
                        title: title,
                        thumbnail_url: imgUrl
                    }]);
                } catch(err) { console.error("Error saving history", err); }
            }
        }
    }

    function closePlayer(event, force = false) {
        if (force || event.target.id === 'videoModal') {
            document.getElementById('playerContainer').innerHTML = ''; 
            document.getElementById('videoModal').classList.remove('active');
        }
    }

    // ================= הצגת היסטוריית צפיות (עם 'טען עוד') =================
    async function fetchAndShowHistory(isLoadMore = false) {
        if (!currentUser) return;
        
        const openGrid = document.getElementById('openGrid');
        const loadMoreHistoryBtn = document.getElementById('loadMoreHistoryBtn');

        // אם זו לחיצה ראשונה על "היסטוריה" (ולא "טען עוד")
        if (!isLoadMore) {
            historyOffset = 0; // איפוס העמוד
            document.getElementById('checkingSidebarWrapper').style.display = 'none';
            document.getElementById('mainContentArea').style.display = 'block';
            document.getElementById('blockedSection').style.display = 'none';
            document.getElementById('loadMoreBtn').style.display = 'none'; // הסתרת כפתור חיפוש
            document.getElementById('mainAreaTitle').innerHTML = '<span>🕒</span> היסטוריית הצפיות שלי';
            
            openGrid.innerHTML = '<div id="historyLoading" style="text-align:center; width:100%; color:#64748b; font-size:1.2em; padding: 20px;">טוען היסטוריה משרתי המערכת...</div>';
        } else {
            // אם לחצו על "טען עוד" נשנה את הטקסט למשתמש
            loadMoreHistoryBtn.innerText = 'טוען...';
            loadMoreHistoryBtn.disabled = true;
        }

        // חישוב מאיזה שורה עד איזה שורה למשוך ממסד הנתונים
        const from = historyOffset;
        const to = historyOffset + HISTORY_PAGE_SIZE - 1;

        const { data, error } = await supabaseClient
            .from('user_history')
            .select('*')
            .order('watched_at', { ascending: false })
            .range(from, to); // <--- הפקודה שאומרת ל-Supabase איזה "עמוד" להביא

        // מחיקת טקסט הטעינה בלחיצה הראשונה
        if (!isLoadMore) {
            const loadingEl = document.getElementById('historyLoading');
            if (loadingEl) loadingEl.remove();
        }

        if (error) {
            if (!isLoadMore) openGrid.innerHTML = '<div style="text-align:center; width:100%; color:red;">שגיאה בטעינת היסטוריה.</div>';
            else alert("שגיאה בטעינת היסטוריה נוספת.");
            
            loadMoreHistoryBtn.disabled = false;
            loadMoreHistoryBtn.innerText = 'טען היסטוריה ישנה יותר 🕒';
            return;
        }

        if (!isLoadMore && data.length === 0) {
            openGrid.innerHTML = '<div style="text-align:center; width:100%; color:#64748b; padding: 40px;">לא נמצאה היסטוריית צפיות. חפש סרטון כדי להתחיל!</div>';
            loadMoreHistoryBtn.style.display = 'none';
            return;
        }

        // ציור הסרטונים החדשים על המסך
        data.forEach(v => {
            const card = document.createElement('div');
            card.className = 'video-card clickable';
            card.onclick = () => openPlayerModal(v.video_id);
            
            const dateStr = new Date(v.watched_at).toLocaleDateString('he-IL', { day: 'numeric', month: 'short', hour: '2-digit', minute:'2-digit' });
            
            card.innerHTML = `
                <div class="status-tag status-history">נצפה ב: ${dateStr}</div>
                <div class="thumb-container">
                    <img src="${v.thumbnail_url}" loading="lazy">
                    <div class="play-overlay">&#9658;</div>
                </div>
                <div class="card-content">
                    <h3>${v.title}</h3>
                </div>
            `;
            openGrid.appendChild(card);
        });

        // עדכון הזיכרון לפעם הבאה שילחצו "טען עוד"
        historyOffset += data.length;

        // האם יש עוד היסטוריה למשוך? 
        // אם Supabase החזיר בדיוק 50, כנראה שיש עוד. אם החזיר פחות, הגענו לסוף ההיסטוריה!
        if (data.length === HISTORY_PAGE_SIZE) {
            loadMoreHistoryBtn.style.display = 'inline-block';
        } else {
            loadMoreHistoryBtn.style.display = 'none';
        }

        // החזרת הכפתור למצב לחיץ
        loadMoreHistoryBtn.disabled = false;
        loadMoreHistoryBtn.innerText = 'טען היסטוריה ישנה יותר 🕒';
    }
</script>
