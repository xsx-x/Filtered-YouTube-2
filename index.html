    <style>
        /* עיצוב נקי, מקצועי ומרשים (SaaS Style) */
        :root {
            --bg-body: #f4f7f9;
            --bg-card: #ffffff;
            --primary: #1a56db;
            --primary-hover: #1e40af;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
            background-color: var(--bg-body);
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { 
            margin: 0 0 12px 0; 
            font-size: 2.8em; 
            color: #0f172a; 
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .header p { 
            margin: 0; 
            color: var(--text-muted); 
            font-size: 1.15em; 
            font-weight: 500;
        }

        /* אזור החיפוש */
        .search-area { 
            display: flex; flex-wrap: wrap; gap: 12px; margin: 0 auto 40px auto; 
            max-width: 900px; width: 100%;
        }
        input {
            flex: 1; min-width: 250px; padding: 16px 20px; 
            border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 16px; outline: none;
            background: var(--bg-card); box-shadow: var(--shadow-sm);
            transition: all 0.2s ease; color: var(--text-main);
        }
        input:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(26, 86, 219, 0.2); 
        }

        button {
            padding: 16px 32px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; box-shadow: var(--shadow-sm);
            white-space: nowrap;
        }
        button:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
        button:active:not(:disabled) { transform: translateY(0); }
        button:disabled { background: #9ca3af; cursor: not-allowed; }
        
        #loadMoreBtn { 
            background: #ffffff; color: var(--text-main); 
            border: 1px solid var(--border-color); display: none; 
        }
        #loadMoreBtn:hover:not(:disabled) { background: #f9fafb; }

        /* חלוקה לסרגל צד ואזור מרכזי */
        .layout-wrapper {
            display: flex; gap: 30px; max-width: 1400px; margin: auto; align-items: flex-start;
            flex: 1; width: 100%;
        }

        /* סרגל צד - בבדיקה */
        .sidebar {
            flex: 0 0 320px; background: var(--bg-card); 
            border-radius: 12px; padding: 24px; 
            border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
            position: sticky; top: 24px; max-height: calc(100vh - 48px);
            overflow-y: auto; display: none; 
        }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        /* אזור מרכזי - פתוחים וחסומים */
        .main-content { flex: 1; min-width: 0; display: none; }

        .section-title { 
            display: flex; align-items: center; gap: 10px; 
            margin: 0 0 20px 0; padding-bottom: 12px; 
            border-bottom: 2px solid #f1f5f9; 
            font-size: 1.25em; font-weight: 700; color: #1e293b;
        }

        /* גריד סרטונים פתוחים */
        .video-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 24px; margin-bottom: 40px;
        }

        /* שורת סרטונים חסומים */
        .blocked-row {
            display: flex; gap: 16px; overflow-x: auto; padding: 4px 4px 20px 4px; 
        }
        .blocked-row::-webkit-scrollbar { height: 6px; }
        .blocked-row::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }

        /* כרטיסיית וידאו */
        .video-card {
            background: var(--bg-card); border-radius: 12px; overflow: hidden;
            transition: all 0.3s ease; position: relative;
            border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);
            animation: fadeIn 0.4s ease forwards;
            display: flex; flex-direction: column;
        }
        
        .video-card.clickable { cursor: pointer; }
        .video-card.clickable:hover { 
            transform: translateY(-4px); 
            box-shadow: var(--shadow-lg); 
            border-color: #cbd5e1;
        }

        .blocked-row .video-card { flex: 0 0 200px; opacity: 0.85; filter: grayscale(20%); }
        .sidebar .video-card { margin-bottom: 16px; box-shadow: none; border-color: #f1f5f9; }

        .thumb-container { position: relative; padding-top: 56.25%; background: #f1f5f9; border-bottom: 1px solid #f1f5f9; }
        .thumb-container img { position: absolute; top: 0; right: 0; width: 100%; height: 100%; object-fit: cover; }

        /* אייקון חץ מנגן (Play) */
        .play-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.7); color: white; border-radius: 50%;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; transition: all 0.2s ease; padding-left: 4px;
            backdrop-filter: blur(4px); border: 2px solid rgba(255,255,255,0.2);
        }
        .video-card.clickable:hover .play-overlay { 
            background: var(--primary); transform: translate(-50%, -50%) scale(1.1); 
            border-color: rgba(255,255,255,0.5);
        }

        .card-content { padding: 14px; }
        .card-content h3 { 
            margin: 0; font-size: 14px; line-height: 1.5; height: 42px; 
            overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; color: var(--text-main); font-weight: 600;
        }

        /* תגיות סטטוס מקצועיות */
        .status-tag {
            position: absolute; top: 10px; right: 10px; padding: 4px 10px;
            border-radius: 9999px; font-size: 11px; font-weight: 700; z-index: 10;
            letter-spacing: 0.5px;
        }
        .status-checking { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
        .status-open { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-blocked { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        /* נגן מובנה (Modal) */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            opacity: 0; transition: opacity 0.3s ease; padding: 20px;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        
        .modal-content-wrapper { position: relative; width: 100%; max-width: 960px; }
        
        .modal-content {
            width: 100%; background: #000; border-radius: 12px; overflow: hidden; 
            position: relative; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); aspect-ratio: 16/9;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .close-btn {
            position: absolute; top: -40px; left: 0; color: #cbd5e1;
            font-size: 14px; cursor: pointer; background: transparent; 
            border: none; padding: 8px 12px; font-weight: 600;
            transition: 0.2s; z-index: 1001; letter-spacing: 0.5px;
        }
        .close-btn:hover { color: white; background: rgba(255,255,255,0.1); border-radius: 6px; }

        #hidden-checker { position: fixed; top: -1000px; width: 1px; height: 1px; overflow: hidden; }
        
        /* קרדיט תחתון */
        .footer-credit {
            text-align: center; margin-top: auto; padding: 60px 20px 20px 20px;
            color: #64748b; font-size: 0.9em;
        }
        .footer-credit a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-credit a:hover { text-decoration: underline; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* רספונסיביות */
        @media (max-width: 900px) {
            .layout-wrapper { flex-direction: column; gap: 20px; }
            .sidebar { flex: none; width: 100%; position: static; max-height: 350px; }
            .header h1 { font-size: 2em; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>יו-טוב, חיפוש וידאו מסונן</h1>
    <p>מנוע חיפוש מסונן המבוסס על בדיקה בזמן אמת ועל מסד נתונים מצטבר</p>
</div>

<div class="search-area">
    <input type="text" id="searchInput" placeholder="מה תרצה לחפש היום?" onkeypress="if(event.key === 'Enter') handleSearch(false)">
    <button id="searchBtn" onclick="handleSearch(false)">חפש עכשיו</button>
    <button id="loadMoreBtn" onclick="handleSearch(true)">טען עוד תוצאות</button>
</div>

<div class="layout-wrapper">
    <!-- צד ימין: סרטונים בבדיקה -->
    <aside class="sidebar" id="checkingSidebarWrapper">
        <h2 class="section-title"><span>⏳</span> כרגע בבדיקה</h2>
        <div id="checkingList"></div>
    </aside>

    <!-- מרכז: תוצאות פתוחות וחסומות -->
    <main class="main-content" id="mainContentArea">
        <div class="open-section">
            <h2 class="section-title"><span>✅</span> סרטונים זמינים לצפייה</h2>
            <div id="openGrid" class="video-grid"></div>
        </div>

        <div class="blocked-section" style="margin-top: 40px;">
            <h2 class="section-title" style="font-size: 1.1em; color: #475569;"><span>❌</span> סרטונים חסומים</h2>
            <div id="blockedRow" class="blocked-row"></div>
        </div>

</div>
<div style="text-align: center; margin-top: 10px; font-size: 0.8em;">

</div>

<script>
function promptUserForKey() {
    const key = prompt("הכנס מפתח API אישי (המפתח נשמר רק עד סגירת הדפדפן):");
    if (key) {
        sessionStorage.setItem('user_api_key', key);
        alert("המפתח הוגדר בהצלחה!");
    }
}
</script>
<!-- קרדיט -->
<div class="footer-credit">
    נבנה על ידי <strong>'לב טוב'</strong> | ליצירת קשר: <a href="mailto:myylbwt@gmail.com">myylbwt@gmail.com</a>
</div>

<!-- המודל של הנגן המוטמע -->
<div class="modal-overlay" id="videoModal" onclick="closePlayer(event)">
    <div class="modal-content-wrapper">
        <button class="close-btn" onclick="closePlayer(event, true)">✖ סגור נגן</button>
        <div class="modal-content" id="playerContainer"></div>
    </div>

<div id="hidden-checker"></div>

<script>
    // ================= הגדרות מערכת =================

    const CONFIG = {
        // רשימת המפתחות שלך - תמלא כאן את כל המפתחות שיש לך
        API_KEYS: [
            'AIzaSyC1bz6pO3sc0DhWW4e7Sp3WLNVsUAi8l2s',
            'AIzaS_מפתח_שני_שלך',
            'AIzaS_מפתח_שלישי_שלך'
        ],
        CURRENT_KEY_INDEX: 0,
        SUPABASE_URL: 'https://rqeluyixgdepgjubersr.supabase.co',
        SUPABASE_KEY: 'sb_publishable_VmT1Idb6Ze1OPYOdBLugPA_VzhSVglQ',
        MAX_CONCURRENT_CHECKS: 5
    };

    // פונקציה לשליפת המפתח הפעיל (כולל בדיקה אם המשתמש הזין מפתח משלו)
    function getActiveApiKey() {
        const userKey = sessionStorage.getItem('user_api_key');
        if (userKey) return userKey;
        return CONFIG.API_KEYS[CONFIG.CURRENT_KEY_INDEX];
    }

    // פונקציה להחלפת מפתח אם נגמר
    function rotateApiKey() {
        if (sessionStorage.getItem('user_api_key')) return; // אם המשתמש עם מפתח אישי, לא נחליף לו
        CONFIG.CURRENT_KEY_INDEX = (CONFIG.CURRENT_KEY_INDEX + 1) % CONFIG.API_KEYS.length;
        console.log("Switching to API Key index:", CONFIG.CURRENT_KEY_INDEX);
    }

    
    const videoCache = {};
    let isYTReady = false;
    let detectedFilter = 'Unknown';
    
    // משתני ניהול החיפוש והדפדוף (Pagination)
    let currentQuery = '';
    let nextPageToken = '';
    let openVideosInCurrentBatch = 0;
    let autoFetchAttempts = 0;

    window.onYouTubeIframeAPIReady = function() { 
        isYTReady = true; 
    };

    // זיהוי ראשוני של סוג הסינון
    async function initFilterDetection() {
        try {
            await fetch('https://netfree.link/api/check-video?v=test', { mode: 'no-cors' });
            detectedFilter = 'NetFree';
        } catch (e) {
            detectedFilter = 'Other';
        }
    }
    initFilterDetection();

    // ================= ניהול החיפוש =================
    async function handleSearch(isLoadMore = false) {
        if (!isYTReady) {
            alert("המערכת טוענת רכיבים, אנא המתן שניה ונסה שוב.");
            return;
        }

        const queryInput = document.getElementById('searchInput').value.trim();
        if (!queryInput) return;

        // אם זה חיפוש חדש
        if (!isLoadMore) {
            currentQuery = queryInput;
            nextPageToken = '';
            autoFetchAttempts = 0;
            
            // ניקוי תוצאות קודמות
            document.getElementById('checkingList').innerHTML = '';
            document.getElementById('openGrid').innerHTML = '';
            document.getElementById('blockedRow').innerHTML = '';
            
            if (typeof gtag !== 'undefined') gtag('event', 'search', { search_term: currentQuery });
        }

        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        
        searchBtn.disabled = true;
        loadMoreBtn.disabled = true;
        
        if (!isLoadMore) searchBtn.innerText = 'מחפש...';
        else loadMoreBtn.innerText = 'טוען...';
        
        // הצגת הסרגל בבדיקה כל פעם שמתחילים לחפש/לטעון עוד
        document.getElementById('checkingSidebarWrapper').style.display = 'block';
        document.getElementById('mainContentArea').style.display = 'block';

        openVideosInCurrentBatch = 0;

        try {
            // שנה את השורה הזו ב-handleSearch:
let apiUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=50&q=${encodeURIComponent(currentQuery)}&type=video&key=${getActiveApiKey()}`;
if (nextPageToken) apiUrl += `&pageToken=${nextPageToken}`;
            const response = await fetch(apiUrl);
            const data = await response.json();

            if (data.error) throw new Error(data.error.message);

            nextPageToken = data.nextPageToken || '';
            const videos = data.items;

            if (videos.length === 0) {
                if (!isLoadMore) alert("לא נמצאו תוצאות לחיפוש זה.");
                return;
            }

            // יצירת חלוניות "בבדיקה"
            videos.forEach(v => renderPlaceholder(v));

            // תור בדיקה חכם
            for (let i = 0; i < videos.length; i += CONFIG.MAX_CONCURRENT_CHECKS) {
                const chunk = videos.slice(i, i + CONFIG.MAX_CONCURRENT_CHECKS);
                await Promise.all(chunk.map(async (v) => {
                    const videoId = v.id.videoId;
                    const title = v.snippet.title;

                    // 1. מסד הנתונים
                    const dbStatus = await checkGlobalIndex(videoId);
                    if (dbStatus === 'blocked') return finalizeStatus(videoId, false, title, false);
                    if (dbStatus === 'open') return finalizeStatus(videoId, true, title, false);

                    // 2. סינון תמונה
                    const isImageOpen = await quickImageCheck(videoId);
                    if (!isImageOpen) return finalizeStatus(videoId, false, title, true);

                    // 3. בדיקת נגן עמוקה
                    await deepPlayerCheck(videoId, title);
                }));
            }

            // עדכון כפתור טען עוד
            if (nextPageToken) {
                loadMoreBtn.style.display = 'inline-block';
                
                // טעינה אוטומטית אם חסרים סרטונים פתוחים
                if (openVideosInCurrentBatch < 3 && autoFetchAttempts < 3) {
                    autoFetchAttempts++;
                    handleSearch(true);
                } else {
                    autoFetchAttempts = 0;
                }
            } else {
                loadMoreBtn.style.display = 'none'; // אין יותר תוצאות
            }

        try {
        // ... (כל הלוגיקה של ה-fetch והחיפוש)
        
    } catch (e) {
        // הטיפול החכם במכסות:
        if (e.message.includes('quota') || e.message.includes('403')) {
            rotateApiKey();
            alert("המכסה של המפתח הנוכחי נגמרה. המערכת עברה אוטומטית למפתח גיבוי. אנא נסה לחפש שוב.");
        } else {
            alert("שגיאה בחיפוש: " + e.message);
        }
    } finally {
        // הכפתורים תמיד חוזרים למצב רגיל בסוף הניסיון (הצלחה או כישלון)
        const searchBtn = document.getElementById('searchBtn');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        searchBtn.disabled = false;
        loadMoreBtn.disabled = false;
        searchBtn.innerText = 'חפש עכשיו';
        loadMoreBtn.innerText = 'טען עוד תוצאות';
        }
    
    }

    // ================= לוגיקת בדיקות =================
    function quickImageCheck(videoId) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = `https://i.ytimg.com/vi/${videoId}/mqdefault.jpg`;
        });
    }

    function deepPlayerCheck(videoId, title) {
        return new Promise((resolve) => {
            if (videoCache[videoId] !== undefined) {
                finalizeStatus(videoId, videoCache[videoId], title, false);
                return resolve();
            }

            const checkDiv = document.createElement('div');
            const divId = `check-${videoId}`;
            checkDiv.id = divId;
            document.getElementById('hidden-checker').appendChild(checkDiv);

            let hasResolved = false;

            const player = new YT.Player(divId, {
                videoId: videoId,
                playerVars: { 'autoplay': 1, 'mute': 1, 'origin': window.location.origin },
                events: {
                    'onReady': (e) => e.target.playVideo(),
                    'onStateChange': (e) => {
                        if (!hasResolved && (e.data === YT.PlayerState.PLAYING || e.data === YT.PlayerState.BUFFERING)) {
                            hasResolved = true;
                            cleanupAndFinish(true);
                        }
                    },
                    'onError': () => {
                        if (!hasResolved) { hasResolved = true; cleanupAndFinish(false); }
                    }
                }
            });

            const timeout = setTimeout(() => {
                if (!hasResolved) { hasResolved = true; cleanupAndFinish(false); }
            }, 6000);

            function cleanupAndFinish(isOpen) {
                clearTimeout(timeout);
                try { player.destroy(); document.getElementById(divId)?.remove(); } catch(err) {}
                finalizeStatus(videoId, isOpen, title, true);
                resolve();
            }
        });
    }

    function finalizeStatus(videoId, isOpen, title, shouldSaveToDB) {
        videoCache[videoId] = isOpen;
        
        const card = document.getElementById(`card-${videoId}`);
        const tag = document.getElementById(`status-${videoId}`);
        if (!card || !tag) return;

        if (isOpen) {
            openVideosInCurrentBatch++;
            tag.innerText = "פתוח";
            tag.className = "status-tag status-open";
            card.classList.add('clickable');
            
            // הוספת החץ היפה על התמונה
            const thumbContainer = card.querySelector('.thumb-container');
            if(!thumbContainer.querySelector('.play-overlay')) {
                const playIcon = document.createElement('div');
                playIcon.className = 'play-overlay';
                playIcon.innerHTML = '&#9658;'; // סמל של Play
                thumbContainer.appendChild(playIcon);
            }
            
            document.getElementById('openGrid').appendChild(card);
            card.onclick = () => openPlayerModal(videoId);
        } else {
            tag.innerText = "חסום";
            tag.className = "status-tag status-blocked";
            card.classList.remove('clickable');
            card.onclick = null;
            
            document.getElementById('blockedRow').appendChild(card);
        }

        if (shouldSaveToDB) saveToGlobalIndex(videoId, title, isOpen);

        // בדיקה האם הסתיימה הסריקה (הרשימה 'בבדיקה' ריקה לגמרי) - אם כן מסתירים את הסרגל צד
        const checkingList = document.getElementById('checkingList');
        if (checkingList.children.length === 0) {
            document.getElementById('checkingSidebarWrapper').style.display = 'none';
        }
    }

    // ================= מסד נתונים (Supabase) =================
    async function checkGlobalIndex(videoId) {
        if (!CONFIG.SUPABASE_URL.includes('http')) return null;
        try {
            const res = await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/videos?video_id=eq.${videoId}&filter_provider=eq.${detectedFilter}&select=status`, {
                headers: { 'apikey': CONFIG.SUPABASE_KEY, 'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}` }
            });
            const data = await res.json();
            return data.length > 0 ? data[0].status : null;
        } catch (e) { return null; }
    }

    async function saveToGlobalIndex(id, title, isOpen) {
        if (!CONFIG.SUPABASE_URL.includes('http')) return;
        try {
            await fetch(`${CONFIG.SUPABASE_URL}/rest/v1/videos`, {
                method: 'POST',
                headers: {
                    'apikey': CONFIG.SUPABASE_KEY,
                    'Authorization': `Bearer ${CONFIG.SUPABASE_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'resolution=merge-duplicates'
                },
                body: JSON.stringify({
                    video_id: id, title: title,
                    status: isOpen ? 'open' : 'blocked',
                    filter_provider: detectedFilter,
                    updated_at: new Date()
                })
            });
        } catch (e) { console.error("DB Save Error", e); }
    }

    // ================= ממשק משתמש ונגן =================
    function renderPlaceholder(v) {
        const id = v.id.videoId;
        const list = document.getElementById('checkingList');
        
        const card = document.createElement('div');
        card.className = 'video-card';
        card.id = `card-${id}`;
        
        card.innerHTML = `
            <div id="status-${id}" class="status-tag status-checking">בבדיקה...</div>
            <div class="thumb-container">
                <img src="${v.snippet.thumbnails.medium.url}" loading="lazy" alt="Thumbnail">
            </div>
            <div class="card-content">
                <h3>${v.snippet.title}</h3>
            </div>
        `;
        list.appendChild(card);
    }

    function openPlayerModal(videoId) {
        const modal = document.getElementById('videoModal');
        const container = document.getElementById('playerContainer');
        
        container.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
        
        modal.classList.add('active');
        if (typeof gtag !== 'undefined') gtag('event', 'video_play', { video_id: videoId });
    }

    function closePlayer(event, force = false) {
        if (force || event.target.id === 'videoModal') {
            const modal = document.getElementById('videoModal');
            document.getElementById('playerContainer').innerHTML = ''; 
            modal.classList.remove('active');
        }
    }
</script>
